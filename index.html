    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Scripts -->

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        :root {
            --bg: #050b05;
            --bg2: #0c130c;
            --cd: #111811;
            --br: #182818;
            --g: #00e676;
            --am: #ffab00;
            --rd: #ff5252;
            --sk: #FFD700;
            --or: #FF6B35;
            --tx: #e8f5e8;
            --mu: #5a8a5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--tx);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
        }

        h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }
        .mono { font-family: 'Space Mono', monospace; }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            padding-bottom: 90px;
        }

        /* sticky header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 11, 5, 0.9);
            backdrop-filter: blur(15px);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--br);
        }

        .logo-box { display: flex; align-items: center; gap: 10px; }
        .avatar {
            width: 34px;
            height: 34px;
            background: var(--sk);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--bg);
            font-size: 18px;
        }

        .logo-text { line-height: 1; }
        .logo-main { color: var(--or); font-weight: 800; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; }
        .logo-sub { color: var(--sk); font-size: 10px; font-weight: 500; display: block; margin-top: 2px; }
        .v-badge { background: var(--br); font-size: 9px; padding: 2px 6px; border-radius: 4px; color: var(--mu); margin-left: 6px; }

        .header-btns { display: flex; gap: 12px; }
        .icon-btn {
            width: 38px;
            height: 38px;
            background: var(--cd);
            border: 1px solid var(--br);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* Nav */
        nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            background: rgba(12, 19, 12, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--br);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px;
            z-index: 200;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--mu);
            font-size: 10px;
            cursor: pointer;
            transition: 0.2s;
            width: 14%;
            text-align: center;
        }
        .nav-item.active { color: var(--g); }
        .nav-item i { font-size: 20px; font-style: normal; }

        /* Generic Cards */
        .card {
            background: var(--cd);
            border: 1px solid var(--br);
            border-radius: 16px;
            padding: 16px;
            margin: 16px;
            transition: 0.3s;
        }
        .gold-card { border: 1.5px solid var(--sk); background: linear-gradient(145deg, var(--cd), #1a221a); }

        /* Home Components */
        .hero {
            background: linear-gradient(165deg, var(--bg2), #0f1a0f);
            padding: 24px 16px;
            border-bottom: 1px solid var(--br);
            text-align: left;
        }
        .hero h1 { font-size: 32px; font-weight: 800; line-height: 0.9; margin-bottom: 8px; }
        .hero p { color: var(--mu); font-size: 13px; }

        .grid-3x2 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 16px;
            margin-top: 16px;
        }
        .grid-item {
            background: var(--cd);
            border: 1px solid var(--br);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .grid-item span { font-size: 11px; font-weight: 500; color: var(--mu); }
        .grid-item i { font-size: 22px; font-style: normal; }

        .section-title { padding: 24px 16px 8px; font-size: 14px; font-weight: 700; color: var(--mu); letter-spacing: 1px; text-transform: uppercase; }

        .swap-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg2);
            padding: 12px;
            border-radius: 12px;
            margin: 0 16px 8px;
            border: 1px solid var(--cd);
        }
        .swap-left { display: flex; align-items: center; gap: 10px; }
        .swap-info { display: flex; flex-direction: column; }
        .from { text-decoration: line-through; color: var(--rd); font-size: 11px; opacity: 0.7; }
        .to { color: var(--g); font-weight: 600; font-size: 14px; }
        .reduction { background: rgba(0, 230, 118, 0.1); color: var(--g); font-weight: 700; font-size: 12px; padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(0,230,118,0.2); }

        /* Foods Tab */
        .search-container { padding: 16px; position: sticky; top: 60px; z-index: 50; background: var(--bg); }
        .search-bar {
            width: 100%;
            background: var(--cd);
            border: 1px solid var(--br);
            padding: 14px 16px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .search-bar:focus { border-color: var(--g); }

        .filter-row {
            display: flex;
            overflow-x: auto;
            padding: 0 16px 16px;
            gap: 8px;
            scrollbar-width: none;
        }
        .filter-row::-webkit-scrollbar { display: none; }
        .chip {
            white-space: nowrap;
            padding: 6px 14px;
            background: var(--cd);
            border: 1px solid var(--br);
            border-radius: 20px;
            font-size: 12px;
            color: var(--mu);
            cursor: pointer;
        }
        .chip.active { background: var(--g); color: var(--bg); font-weight: 600; border-color: var(--g); }

        .food-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 16px 100px;
        }
        .food-card {
            background: var(--cd);
            border: 1px solid var(--br);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .gi-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            z-index: 2;
        }
        .b-green { background: var(--g); color: var(--bg); }
        .b-amber { background: var(--am); color: var(--bg); }
        .b-red { background: var(--rd); color: white; }

        .food-img-ph { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 40px; background: rgba(255,255,255,0.02); overflow: hidden; }
        .food-img-ph img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .food-card:hover img { transform: scale(1.1); }
        
        .food-info { padding: 12px; }
        .food-name { font-size: 13px; font-weight: 600; text-wrap: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .food-meta { font-size: 10px; color: var(--mu); display: flex; gap: 8px; margin-top: 4px; }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--br);
        }
        .close-btn { font-size: 24px; color: var(--mu); cursor: pointer; padding: 4px; }

        .logic-banner {
            padding: 12px;
            text-align: center;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .macro-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 16px;
        }
        .macro-item {
            background: var(--bg2);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--br);
        }
        .macro-val { font-family: 'Space Mono'; font-weight: bold; font-size: 12px; display: block; }
        .macro-lab { font-size: 8px; color: var(--mu); text-transform: uppercase; }

        .chart-box {
            padding: 16px;
            background: var(--cd);
            margin: 16px;
            border-radius: 16px;
            border: 1px solid var(--br);
        }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .chart-title { font-size: 12px; font-weight: 700; color: var(--mu); text-transform: uppercase; }
        .chart-label { padding: 4px 8px; background: var(--bg2); border: 1px solid var(--br); border-radius: 4px; font-size: 9px; line-height: 1.2; text-align: right; }

        .hack-card {
            border: 1.5px solid var(--sk);
            background: rgba(255, 215, 0, 0.03);
            margin: 16px;
            padding: 16px;
            border-radius: 16px;
        }
        .hack-label { color: var(--sk); font-weight: 800; font-size: 11px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

        /* Health Tab */
        .calculator { padding: 16px; }
        .age-result {
            font-size: 72px;
            font-weight: 800;
            text-align: center;
            margin: 20px 0;
            font-family: 'Space Mono', monospace;
            background: var(--cd);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--br);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 12px; color: var(--mu); margin-bottom: 6px; font-weight: 500; }
        .input-group input {
            width: 100%;
            background: var(--cd);
            border: 1px solid var(--br);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-family: 'Space Mono', monospace;
            outline: none;
        }
        .input-group input:focus { border-color: var(--sk); }

        /* Seekha Tab */
        .protocol-item {
            margin: 12px 16px;
            border: 1px solid var(--br);
            border-radius: 12px;
            overflow: hidden;
            background: var(--cd);
        }
        .protocol-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .protocol-body { padding: 16px; background: var(--bg2); border-top: 1px solid var(--br); }

        /* Coach Tab */
        .chat-container { height: calc(100vh - 200px); display: flex; flex-direction: column; padding: 16px; }
        .messages { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; scrollbar-width: none; }
        .messages::-webkit-scrollbar { display: none; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 14px; position: relative; }
        .msg.bot { background: var(--cd); border: 1px solid var(--br); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.user { background: var(--mu); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .bot-options { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; scrollbar-width: none; }
        .opt-btn { background: var(--cd); border: 1px solid var(--br); color: var(--tx); padding: 10px 16px; border-radius: 10px; font-size: 12px; white-space: nowrap; cursor: pointer; }
        .opt-btn:active { background: var(--br); }

        /* Disclaimer Modal */
        .disc-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }
        .disc-box {
            background: var(--cd);
            border: 2px solid var(--or);
            padding: 32px;
            border-radius: 24px;
            max-width: 400px;
            box-shadow: 0 0 50px rgba(255, 107, 53, 0.1);
        }
        .disc-h { color: var(--or); font-size: 28px; font-weight: 800; margin-bottom: 16px; }
        .disc-p { color: var(--mu); margin-bottom: 32px; font-size: 15px; text-align: left; }
        .disc-btn {
            background: var(--or);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 800;
            border: none;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 107, 53, 0.2);
            transition: 0.3s;
        }

        /* Profile */
        .profile-hero { text-align: center; padding: 32px 16px; }
        .p-avatar { width: 80px; height: 80px; margin: 0 auto 16px; border: 2px solid var(--sk); padding: 5px; border-radius: 50%; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .p-stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--br); border: 1px solid var(--br); border-radius: 12px; overflow: hidden; }
        .p-stat { background: var(--cd); padding: 12px; display: flex; flex-direction: column; align-items: center; }
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--cd); border-radius: 12px; margin: 8px 16px; border: 1px solid var(--br); cursor: pointer; }
        .toggle { width: 44px; height: 24px; background: var(--br); border-radius: 12px; position: relative; transition: 0.3s; }
        .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        .toggle.on { background: #ff4081; }
        .toggle.on::after { transform: translateX(20px); }

        footer { padding: 24px 16px 40px; text-align: center; color: var(--mu); font-size: 10px; line-height: 1.6; }
        
        .disclaimer-text { font-size: 9px; color: var(--mu); opacity: 0.8; margin-top: 10px; }

        /* Animation */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        main { animation: fadeIn 0.4s ease-out; }
    </style>
</head>

                                <YAxis hide domain={[0, 100]} />
                                <Tooltip 
                                    contentStyle={{background:'#111', border:'1px solid #333', fontSize:11, padding: '8px'}}
                                    itemStyle={{padding: '2px 0'}}
                                    cursor={{stroke: '#333'}}
                                />
                                <Line type="monotone" dataKey="alone" stroke="#ffab00" strokeWidth={3} dot={false} animationDuration={1000} />
                                <Line type="monotone" dataKey="hacked" stroke="#00e676" strokeWidth={4} dot={false} animationDuration={1000} />
                                <Line type="monotone" dataKey="diab" stroke="#ff1744" strokeWidth={2} strokeDasharray="5 5" dot={false} animationDuration={1000} />
                            </LineChart>
                        </ResponsiveContainer>
                    </div>
                    <div className="flex justify-between mt-1" style={{fontSize:9, color:'var(--mu)', padding:'0 10px'}}>
                        <span>0 MIN</span><span>60 MIN</span><span>120 MIN</span>
                    </div>
                </div>
            );
        }

        // TABS
        const HomeTab = ({setTab, onFoodSelect}) => (
            <div>
                <div className="hero">
                    <h1>BEAT THE<br/><span style={{color:'var(--mu)'}}>SPIKE</span></h1>
                    <p> · Certified Nutrition Coach</p>
                </div>

                <div className="grid-3x2">
                    <div className="grid-item" onClick={()=>setTab('scan')}><i>📸</i><span>Scan Food</span></div>
                    <div className="grid-item" onClick={()=>setTab('foods')}><i>🍽</i><span>Food List</span></div>
                    <div className="grid-item" onClick={()=>setTab('health')}><i>🧬</i><span>Glucose Age</span></div>
                    <div className="grid-item"><i>🔥</i><span>Optimizer</span></div>
                    <div className="grid-item" onClick={()=>setTab('seekha')}><i>📜</i><span>Protocols</span></div>
                    <div className="grid-item" onClick={()=>setTab('coach')}><i>🧠</i><span>AI Coach</span></div>
                </div>

                <div className="card gold-card">
                    <div className="hack-label"><i>🌟</i> EXPERT'S HACK OF THE DAY</div>
                    <p style={{fontSize:14, fontWeight:500, lineHeight:1.4}}>Always eat fiber (vegetables or dal) 10 minutes before your main meal. This creates a "net" in your stomach, reducing insulin spikes by up to 35%.</p>
                </div>

                <div className="section-title">Smart Swaps</div>
                {SWAPS.map((s, i) => (
                    <div className="swap-item" key={i}>
                        <div className="swap-left">
                            <span style={{fontSize:24}}>{s.e}</span>
                            <div className="swap-info">
                                <span className="from">{s.f}</span>
                                <span className="to">{s.t}</span>
                            </div>
                        </div>
                        <div className="reduction">{s.r}</div>
                    </div>
                ))}
            </div>
        );

        const FoodsTab = ({onFoodSelect, isPcos}) => {
            const [query, setQuery] = useState('');
            const [cat, setCat] = useState('all');
            const [gi, setGi] = useState('all');

            const filtered = useMemo(() => FDB.filter(f => {
                const matchesSearch = f.name.toLowerCase().includes(query.toLowerCase());
                const matchesCat = cat === 'all' || f.category === cat;
                const matchesGi = gi === 'all' || 
                    (gi === 'green' && f.gi < 55) || 
                    (gi === 'amber' && f.gi >= 55 && f.gi < 70) || 
                    (gi === 'red' && f.gi >= 70);
                const matchesPcos = !isPcos || f.pcos;
                return matchesSearch && matchesCat && matchesGi && matchesPcos;
            }), [query, cat, gi, isPcos]);

            return (
                <div>
                    <div className="search-container">
                        <input className="search-bar" placeholder="Search 577+ foods..." value={query} onChange={e=>setQuery(e.target.value)} />
                    </div>
                    <div className="filter-row">
                        {['all', 'grains', 'lentils', 'vegetables', 'fruits', 'dairy', 'curries', 'sweets', 'snacks', 'beverages'].map(c => (
                            <div key={c} className={`chip ${cat === c ? 'active' : ''}`} onClick={()=>setCat(c)}>
                                {c.charAt(0).toUpperCase() + c.slice(1)}
                            </div>
                        ))}
                    </div>
                    <div className="filter-row" style={{paddingTop:0}}>
                        {['all', 'green', 'amber', 'red'].map(g => (
                            <div key={g} className={`chip ${gi === g ? 'active' : ''}`} onClick={()=>setGi(g)}>
                                {g === 'all' ? 'All GI' : g.toUpperCase()}
                            </div>
                        ))}
                    </div>
                    <div className="food-grid">
                        {filtered.map(f => (
                            <div className="food-card" key={f.id} onClick={()=>onFoodSelect(f)}>
                                <div className={`gi-badge b-${f.level}`}>GI {f.gi}</div>
                                <FoodImg food={f} size={120} />
                                <div className="food-info">
                                    <span className="food-name">{f.name}</span>
                                    <div className="food-meta">
                                        <span>🔥 {f.calories} cal</span>
                                        <span>🧬 {f.carbs}g carb</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const HealthTab = () => {
            const [data, setData] = useState({ age: 30, glucose: 95, spike: 30, sleep: 7, hba1c: 5.2 });
            const gAge = useMemo(() => {
                const fastingPenalty = data.glucose < 90 ? -3 : data.glucose <= 99 ? 0 : data.glucose <= 109 ? 3 : data.glucose <= 125 ? 7 : 12;
                const spikePenalty = data.spike < 20 ? -2 : data.spike <= 30 ? 0 : data.spike <= 45 ? 3 : data.spike <= 60 ? 6 : 10;
                const sleepAdjust = data.sleep >= 8 ? -2 : data.sleep < 6 ? 4 : 0;
                const hba1cAdjust = !data.hba1c ? 0 : data.hba1c < 5.4 ? -4 : data.hba1c >= 6.5 ? 10 : data.hba1c >= 5.7 ? 5 : 0;
                return parseInt(data.age) + fastingPenalty + spikePenalty + sleepAdjust + hba1cAdjust;
            }, [data]);

            return (
                <div className="calculator">
                    <h2 style={{fontSize:24, marginBottom:4}}> Glucose Age Protocol™</h2>
                    <p style={{color:'var(--mu)', fontSize:12, marginBottom:24}}>Calculated based on insulin sensitivity markers</p>
                    <div className="age-result" style={{color: gAge <= data.age ? 'var(--g)' : 'var(--rd)'}}>
                        <span style={{fontSize:14, display:'block', color:'var(--mu)', marginBottom: -10}}>Your Glucose Age</span>
                        {gAge}
                    </div>
                    
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16}}>
                        <div className="input-group">
                            <label>Real Age</label>
                            <input type="number" value={data.age} onChange={e=>setData({...data, age:e.target.value})} />
                        </div>
                        <div className="input-group">
                            <label>Fasting Glucose</label>
                            <input type="number" value={data.glucose} onChange={e=>setData({...data, glucose:e.target.value})} />
                        </div>
                        <div className="input-group">
                            <label>Avg Post-Meal Spike</label>
                            <input type="number" value={data.spike} onChange={e=>setData({...data, spike:e.target.value})} />
                        </div>
                        <div className="input-group">
                            <label>Sleep Hours</label>
                            <input type="number" value={data.sleep} onChange={e=>setData({...data, sleep:e.target.value})} />
                        </div>
                    </div>
                    <div className="input-group">
                        <label>HbA1c (Optional)</label>
                        <input type="number" step="0.1" value={data.hba1c} onChange={e=>setData({...data, hba1c:e.target.value})} />
                    </div>
                    <button className="disc-btn" style={{marginTop:20, background: 'var(--cd)', border: '1px solid var(--br)'}}>
                        Share My Results
                    </button>
                    <p className="disclaimer-text" style={{textAlign:'center'}}>This is a research-based estimate and not a medical diagnosis.</p>
                </div>
            );
        };

        const ProtocolsTab = () => {
            const [open, setOpen] = useState(0);
            const pro = [
                {
                    t: "Expert's 5-Day IR Reversal Kickstart", 
                    sub: "Expected: 28-40% spike reduction", 
                    d: [
                        "Day 1: Remove Spikes — zero white rice, no sugar, dal before every meal, 10-min walks",
                        "Day 2: Protein Power — 20g protein first, ACV before lunch/dinner",
                        "Day 3: Fat Barrier Day — ghee on carbs, avocado before high-carb meal",
                        "Day 4: Gut Reset — fermented food every meal, 30g fiber target",
                        "Day 5: Measure the Difference — log all meals, share result"
                    ]
                },
                {
                    t: "Expert's 14-Day PCOS Balance Protocol", 
                    sub: "Expected: Reduced acne, regular cycles", 
                    d: [
                        "Week 1: Eliminate all white rice, maida, sugar completely",
                        "Week 2: Add protein to every meal minimum 20g",
                        "Daily: Spearmint tea, inositol foods (chickpeas, citrus)",
                        "Daily: 30-min morning walk on empty stomach"
                    ]
                },
                {
                    t: "Expert's 7-Day Hostel IR Hack Plan", 
                    sub: "Budget: ₹80-120/day", 
                    d: [
                        "Breakfast: Sprouts + boiled egg or moong dal cheela",
                        "Lunch: Dal + sabzi first, then small rice portion",
                        "Dinner: Curd rice or dal + roti"
                    ]
                },
                {
                    t: "Expert's 21-Day Heart Health Protocol", 
                    sub: "LDL -8%, HDL +12%", 
                    d: [
                        "Week 1 (Eliminate): Remove all trans fats, white sugar, refined carbs",
                        "Week 2 (Load): Add omega-3 foods — flaxseed, walnuts, fatty fish 3x/week",
                        "Week 3 (Maintain): Mediterranean eating pattern fully adopted"
                    ]
                },
                {
                    t: "Expert's 30-Day Kids Metabolic Reset", 
                    sub: "Energy + focus improvement", 
                    d: [
                        "Remove: All packaged snacks, cold drinks, white bread",
                        "Replace: Fruits with peanut butter, homemade trail mix",
                        "School lunch: Dal paratha or egg roll + fruit"
                    ]
                }
            ];
            return (
                <div style={{paddingBottom: 40}}>
                   <div className="section-title"> Protocols™</div>
                   {pro.map((p, i) => (
                       <div className="protocol-item" key={i}>
                           <div className="protocol-header" onClick={()=>setOpen(open === i ? -1 : i)}>
                               <div>
                                   <div style={{fontWeight:800, fontSize:14}}>{p.t}</div>
                                   <div style={{fontSize:10, color:'var(--mu)', marginTop:2}}>{p.sub}</div>
                               </div>
                               <span style={{fontSize:20, color: open===i ? 'var(--sk)' : 'var(--mu)'}}>{open === i ? '−' : '+'}</span>
                           </div>
                           {open === i && (
                               <div className="protocol-body">
                                   {p.d.map((line, idx) => (
                                       <div key={idx} style={{display:'flex', gap:12, marginBottom:12}}>
                                           <div style={{height:6, width:6, borderRadius:'50%', background:'var(--sk)', marginTop:6}}></div>
                                           <p style={{fontSize:13, lineHeight:1.4}}>{line}</p>
                                       </div>
                                   ))}
                               </div>
                           )}
                       </div>
                   ))}
                </div>
            )
        }

        const CoachTab = () => {
            const [msgs, setMsgs] = useState([{t: "I am Expert's AI Coach. Ask me anything.", b: true}]);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [msgs]);

            const addMsg = (txt, isBot) => setMsgs(prev => [...prev, {t:txt, b:isBot}]);
            
            const ask = (q) => {
                addMsg(q, false);
                setTimeout(() => {
                    let ans = "Key principle: protein and fiber BEFORE carbs, walk AFTER carbs, sleep 7-8 hours. These 3 habits reduce average spike 30-40%. — Your Nutrition Coach";
                    if (q.includes('HbA1c')) ans = "Your HbA1c reflects 90-day glucose average. Main culprits: rice/roti without protein first, skipping post-meal walk, poor sleep, hidden sugars in chai. Start with the 5-Day IR Kickstart Protocol. — Your Nutrition Coach";
                    if (q.includes('PCOS')) ans = "Protein-first breakfast for PCOS: 2 boiled eggs + moong dal cheela + half apple. Avoids insulin-androgen axis. Never fruit juice. — Your Nutrition Coach";
                    if (q.includes('rice')) ans = "Rice is fine with hacks: eat dal first, add ghee, walk 10 min after. Cool and reheat = 25% less spike. Never eat rice alone. — Your Nutrition Coach";
                    if (q.includes('snack')) ans = "Top picks: roasted chana GI 28, moong dal cheela, sprouts chaat, Greek yogurt with berries, peanuts with apple. All create flat glucose curves. — Your Nutrition Coach";
                    addMsg(ans, true);
                }, 800);
            }

            return (
                <div className="chat-container">
                    <div className="messages" ref={scrollRef}>
                        {msgs.map((m, i) => (
                            <div key={i} className={`msg ${m.b ? 'bot' : 'user'}`}>{m.t}</div>
                        ))}
                    </div>
                    <div className="bot-options">
                        <button className="opt-btn" onClick={()=>ask("Why is my HbA1c high?")}>Why is HbA1c high?</button>
                        <button className="opt-btn" onClick={()=>ask("Best breakfast for PCOS?")}>PCOS breakfast ideas?</button>
                        <button className="opt-btn" onClick={()=>ask("Is rice OK?")}>Is rice allowed?</button>
                        <button className="opt-btn" onClick={()=>ask("Best Indian snack for diabetes?")}>Healthy Indian snacks?</button>
                    </div>
                </div>
            );
        }

        const ScanTab = () => {
            const [scanned, setScanned] = useState(false);
            const food = FDB.find(f => f.name === 'White Basmati Rice'); 
            
            if (scanned) return (
                <div style={{padding:16}}>
                   <h2 style={{color:'var(--am)', letterSpacing:1}}>SCAN COMPLETE</h2>
                   <div style={{fontSize:24, fontWeight:700, margin:'16px 0', display:'flex', alignItems:'center', gap:10}}>
                       📸 Chicken Biryani <span style={{fontSize:12, color:'var(--mu)', fontWeight:400}}>(as Steamed Rice)</span>
                   </div>
                   <CGMChart food={food} />
                   <div className="hack-card" style={{margin:'16px 0'}}>
                       <div className="hack-label"><i>🌟</i> EXPERT'S CLINICAL HACK</div>
                       <p style={{fontSize:14, lineHeight:1.4}}>{food.hack}</p>
                   </div>
                   <button className="disc-btn" onClick={()=>setScanned(false)}>Scan Another Meal</button>
                   <footer style={{paddingBottom:80}}>Estimates for educational purposes. Always verify with CGM.</footer>
                </div>
            );
            
            return (
                <div style={{textAlign:'center', padding:40, paddingTop:80}}>
                    <div style={{fontSize:80, marginBottom:20}}>📷</div>
                    <h1 style={{fontSize:32}}>Metabolic Scanner</h1>
                    <p style={{color:'var(--mu)', margin:'12px 0 40px', fontSize:15}}>Upload a photo of your meal to see your predicted glucose response curve instantly.</p>
                    <button className="disc-btn" style={{marginBottom:16}}>Open Camera</button>
                    <button className="opt-btn" style={{width:'100%', padding:'14px'}} onClick={()=>setScanned(true)}>Try Sample Scan</button>
                </div>
            );
        }

        const ProfileTab = ({pcos, setPcos}) => (
            <div>
                <div className="profile-hero">
                    <div className="p-avatar">👩⚕️</div>
                    <h2 style={{color:'var(--sk)', fontSize:16, letterSpacing:1}}>INTERNATIONAL CERTIFIED Nutrition Coach</h2>
                    <p style={{fontSize:22, fontWeight:800}}></p>
                </div>
                <div className="p-stat-grid" style={{margin:'0 16px'}}>
                    <div className="p-stat"><span className="mono text-g" style={{fontSize:18}}>14</span><span className="macro-lab">Day Streak</span></div>
                    <div className="p-stat"><span className="mono text-sk" style={{fontSize:18}}>128</span><span className="macro-lab">Food Scans</span></div>
                    <div className="p-stat"><span className="mono text-or" style={{fontSize:18}}>+22</span><span className="macro-lab">Avg Spike</span></div>
                </div>
                
                <div className="section-title">App Settings</div>
                
                <div className="toggle-row" onClick={()=>setPcos(!pcos)}>
                    <div>
                        <div style={{fontWeight:600}}>PCOS Metabolic Mode</div>
                        <div style={{fontSize:10, color:'var(--mu)'}}>Harsher GI penalties & protein prioritization</div>
                    </div>
                    <div className={`toggle ${pcos ? 'on' : ''}`}></div>
                </div>
                
                <div className="toggle-row">
                    <div>
                        <div style={{fontWeight:600}}>Smart Notifications</div>
                        <div style={{fontSize:10, color:'var(--mu)'}}>Reminders for ACV and 10-min post-meal walks</div>
                    </div>
                    <div className="toggle on"></div>
                </div>
                
                <div className="toggle-row">
                    <div>
                        <div style={{fontWeight:600}}>Biometric Sync (Beta)</div>
                        <div style={{fontSize:10, color:'var(--mu)'}}>Connect Apple Health & CGM data</div>
                    </div>
                    <div className="toggle"></div>
                </div>
                
                <div style={{padding:20, textAlign:'center'}}>
                    <p style={{fontSize:11, color:'var(--mu)', fontWeight:700}}>SPIKELESS™ v16.0 PRO</p>
                    <p className="disclaimer-text">SPIKELESS™ is a wellness tool, not a medical device. Consult your doctor before making dietary changes.</p>
                </div>
            </div>
        );

        // MAIN APP
        const App = () => {
            const [tab, setTab] = useState('home');
            const [accepted, setAccepted] = useState(localStorage.getItem('spikeless_v16_accepted') === 'true');
            const [selected, setSelected] = useState(null);
            const [isPcos, setIsPcos] = useState(false);

            if (!accepted) return (
                <div className="disc-modal">
                    <div className="disc-box">
                        <div className="avatar" style={{margin:'0 auto 20px', width:50, height:50, fontSize:24}}>S</div>
                        <div className="disc-h">SPIKELESS™</div>
                        <p className="disc-p">SPIKELESS™ is a metabolic wellness tool designed for educational purposes only. It is not a medical device, and  is a Certified Nutrition Coach, not a medical doctor. Predicted glucose curves are based on scientific GI data but individual responses vary. Consult your physician before making dietary changes.</p>
                        <button className="disc-btn" onClick={() => {
                            localStorage.setItem('spikeless_v16_accepted', 'true');
                            setAccepted(true);
                        }}>I Understand — Let's Start</button>
                    </div>
                </div>
            );

            return (
                <div className="app-container">
                    <header>
                        <Logo />
                        <div className="header-btns">
                            <div className="icon-btn" onClick={()=>setTab('scan')}>📸</div>
                            <div className="icon-btn" onClick={()=>setTab('profile')}>👤</div>
                        </div>
                    </header>

                    <main>
                        {tab === 'home' && <HomeTab setTab={setTab} onFoodSelect={setSelected} />}
                        {tab === 'foods' && <FoodsTab onFoodSelect={setSelected} isPcos={isPcos} />}
                        {tab === 'scan' && <ScanTab />}
                        {tab === 'health' && <HealthTab />}
                        {tab === 'protocols' && <ProtocolsTab />}
                        {tab === 'coach' && <CoachTab />}
                        {tab === 'profile' && <ProfileTab pcos={isPcos} setPcos={setIsPcos} />}
                    </main>

                    <nav>
                        {[
                            {id:'home', l:'Home', i:'🏠'},
                            {id:'foods', l:'Foods', i:'🍽'},
                            {id:'scan', l:'Scan', i:'📸'},
                            {id:'health', l:'Health', i:'🧬'},
                            {id:'protocols', l:'Protocols', i:'🌟'},
                            {id:'coach', l:'Coach', i:'🧠'},
                            {id:'profile', l:'Profile', i:'👤'}
                        ].map(n => (
                            <div key={n.id} className={`nav-item ${tab === n.id ? 'active' : ''}`} onClick={()=>setTab(n.id)}>
                                <i>{n.i}</i>
                                <span>{n.l}</span>
                            </div>
                        ))}
                    </nav>

                    {selected && (
                        <div className="modal">
                            <div className="modal-header">
                                <div className="close-btn" onClick={()=>setSelected(null)}>✕</div>
                                <div style={{fontSize:18, fontWeight:800}}>{selected.name}</div>
                                <div className="avatar" style={{background:'var(--cd)', color: 'var(--mu)', border:'1px solid var(--br)', width:32, height:32, fontSize:16}}>{selected.e}</div>
                            </div>

                            <div className={`logic-banner b-${selected.level}`}>{selected.lv} GLYCEMIC IMPACT</div>

                            <div className="food-img-ph" style={{height: 200, background: 'var(--bg2)'}}>
                                <FoodImg food={selected} size={200} />
                            </div>

                            <div className="macro-grid">
                                <div className="macro-item"><span className="macro-val">{selected.carbs}g</span><span className="macro-lab">Carbs</span></div>
                                <div className="macro-item"><span className="macro-val">{selected.protein}g</span><span className="macro-lab">Protein</span></div>
                                <div className="macro-item"><span className="macro-val">{selected.fat}g</span><span className="macro-lab">Fat</span></div>
                                <div className="macro-item"><span className="macro-val">{selected.fiber}g</span><span className="macro-lab">Fiber</span></div>
                                <div className="macro-item"><span className="macro-val">{selected.calories}</span><span className="macro-lab">kcal</span></div>
                            </div>

                            <CGMChart food={selected} />

                            <div className="hack-card">
                                <div className="hack-label"><i>🌟</i> EXPERT'S CLINICAL HACK</div>
                                <p style={{fontSize:14, lineHeight:1.5, fontWeight:500}}>{selected.hack}</p>
                            </div>

                            <div className="card" style={{marginTop:0, borderColor: 'rgba(0,230,118,0.3)'}}>
                                <div className="hack-label" style={{color: 'var(--g)'}}>OPTIMAL PAIRING SUGGESTION</div>
                                <p style={{fontSize:14, fontWeight:600}}>{selected.pair}</p>
                            </div>

                            <footer style={{paddingTop:20, paddingBottom:60}}>
                                <p style={{fontSize:11, fontWeight:700, color:'var(--tx)', marginBottom:4}}>METABOLIC COMPLIANCE NOTICE</p>
                                Estimates are for educational purposes only. Predicted curves reflect averages from insulin response research. Individual responses vary by gut microbiome and muscle mass. Not medical advice.
                            </footer>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<App/>, document.getElementById('root'))
    </script>
</body>
</html>
